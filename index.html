<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dünyası — Özgür Sim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--s1:#0f1623;--s2:#161f30;--s3:#1c2840;
  --b1:#1e2d45;--b2:#2a3f5f;--b3:#3a5580;
  --t1:#e8f0fe;--t2:#8eadd4;--t3:#4a6a8a;
  --acc:#4ade80;--acc2:#60a5fa;--acc3:#f59e0b;--acc4:#f472b6;--acc5:#a78bfa;
  --red:#f87171;--ora:#fb923c;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'JetBrains Mono',monospace}
#app{display:grid;grid-template-columns:1fr 320px;height:100vh}

/* WORLD */
#world{position:relative;overflow:hidden}
#worldCanvas{position:absolute;inset:0;width:100%;height:100%}
#topBar{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:20;background:linear-gradient(to bottom,rgba(8,12,20,.95),transparent)}
.worldTitle{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--t1)}
.worldTitle span{color:var(--acc)}
#worldTime{font-size:9px;color:var(--t3);margin-top:1px}
#speedRow{display:flex;gap:5px;align-items:center}
.spBtn{padding:4px 10px;background:var(--s2);border:1px solid var(--b1);color:var(--t3);font-family:'JetBrains Mono',monospace;font-size:9px;border-radius:4px;cursor:pointer;transition:all .2s}
.spBtn:hover,.spBtn.on{border-color:var(--acc);color:var(--acc)}

/* DIALOGUE POPUP */
#dialogueBox{position:absolute;bottom:16px;left:16px;right:16px;z-index:30;pointer-events:none;display:flex;flex-direction:column;gap:6px;max-height:220px;overflow:hidden}
.dialogBubble{background:rgba(15,22,35,.92);border:1px solid var(--b2);border-radius:10px;padding:8px 12px;animation:slideUp .3s ease;max-width:85%}
.dialogBubble.think{border-color:var(--acc5);opacity:.85;font-style:italic}
.dialogBubble.speak{border-color:var(--acc2)}
.dialogBubble .dName{font-size:9px;font-weight:700;margin-bottom:3px}
.dialogBubble .dText{font-size:10px;color:var(--t2);line-height:1.5}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* SIDEBAR */
#sidebar{background:var(--s1);border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}
#tabs{display:flex;border-bottom:1px solid var(--b1)}
.tab{flex:1;padding:10px 6px;font-size:9px;letter-spacing:1px;text-transform:uppercase;text-align:center;cursor:pointer;color:var(--t3);transition:all .2s;border-bottom:2px solid transparent}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.tabPane{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--b1) transparent;display:none}
.tabPane.on{display:block}

/* AGENT CARDS */
.aCard{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:10px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.aCard:hover,.aCard.sel{border-color:var(--acc2)}
.aTop{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.aAva{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.aName{font-family:'Syne',sans-serif;font-size:12px;font-weight:700}
.aState{font-size:8px;color:var(--t3);margin-top:2px;line-height:1.4}
.needGrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:7px}
.needItem{font-size:8px;color:var(--t3);margin-bottom:2px}
.bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden}
.bf{height:100%;border-radius:2px;transition:width .5s}
.inventory{margin-top:6px;border-top:1px solid var(--b1);padding-top:6px}
.invTitle{font-size:8px;color:var(--t3);margin-bottom:4px;letter-spacing:1px}
.invItems{display:flex;flex-wrap:wrap;gap:4px}
.invItem{background:var(--s3);border:1px solid var(--b1);border-radius:4px;padding:2px 6px;font-size:9px;color:var(--t2)}

/* WORLD LOG */
.logEntry{font-size:9px;color:var(--t3);padding:4px 0;border-bottom:1px solid rgba(30,45,69,.4);line-height:1.4}
.logEntry .lName{font-weight:700}
.logEntry .lTime{color:var(--b3);float:right}

/* CONTROLS */
#ctrlPane{padding:10px;border-top:1px solid var(--b1)}
.ctrlSec{font-size:8px;color:var(--t3);margin-bottom:6px;letter-spacing:2px;text-transform:uppercase}
.cBtn{width:100%;padding:7px 10px;background:var(--s2);border:1px solid var(--b1);color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:9px;border-radius:6px;cursor:pointer;margin-bottom:4px;text-align:left;transition:all .2s}
.cBtn:hover{border-color:var(--acc);color:var(--acc)}
.cBtn.dng:hover{border-color:var(--red);color:var(--red)}

/* MIND PANE */
.mindCard{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:10px;margin-bottom:8px}
.mindName{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;margin-bottom:6px}
.mindThought{font-size:9px;color:var(--t2);line-height:1.6;font-style:italic;border-left:2px solid var(--acc5);padding-left:8px;margin-bottom:6px}
.mindChat{font-size:9px;color:var(--t1);line-height:1.6;border-left:2px solid var(--acc2);padding-left:8px}
.mindLoading{font-size:9px;color:var(--t3);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* NATURE LEGEND */
#legend{position:absolute;top:50px;right:8px;z-index:15;background:rgba(15,22,35,.85);border:1px solid var(--b1);border-radius:8px;padding:8px;font-size:8px;color:var(--t3)}
#legend div{margin-bottom:2px}
</style>
</head>
<body>
<div id="app">
<div id="world">
  <canvas id="worldCanvas"></canvas>
  <div id="topBar">
    <div>
      <div class="worldTitle">🌍 AI Dünyası — <span>Özgür Evren</span></div>
      <div id="worldTime">Gün 1 · 00:00</div>
    </div>
    <div id="speedRow">
      <span style="font-size:9px;color:var(--t3)">Hız</span>
      <button class="spBtn on" onclick="setSpd(1)" id="s1">1×</button>
      <button class="spBtn" onclick="setSpd(2)" id="s2">2×</button>
      <button class="spBtn" onclick="setSpd(5)" id="s5">5×</button>
    </div>
  </div>
  <div id="legend">
    <div>🌳 Ağaç · 🍄 Mantar · 🪨 Taş</div>
    <div>💧 Göl · 🌾 Tarla · 🔥 Ateş</div>
    <div>🐺 Kurt · 🐇 Tavşan · 🦌 Geyik</div>
    <div>🐟 Balık · 🐝 Arı · 🦅 Kartal</div>
  </div>
  <div id="dialogueBox"></div>
</div>
<div id="sidebar">
  <div id="tabs">
    <div class="tab on" onclick="showTab('agents')">Ajanlar</div>
    <div class="tab" onclick="showTab('mind')">Zihin</div>
    <div class="tab" onclick="showTab('log')">Günlük</div>
  </div>
  <div class="tabPane on" id="agents"></div>
  <div class="tabPane" id="mind"></div>
  <div class="tabPane" id="log"></div>
  <div id="ctrlPane">
    <div class="ctrlSec">Doğa Müdahaleleri</div>
    <button class="cBtn" onclick="spawnNature('tree')">🌳 Ağaç Dik</button>
    <button class="cBtn" onclick="spawnNature('lake')">💧 Göl Oluştur</button>
    <button class="cBtn" onclick="spawnNature('stone')">🪨 Taş Getir</button>
    <button class="cBtn" onclick="spawnNature('animal_rabbit')">🐇 Tavşan Bırak</button>
    <button class="cBtn" onclick="spawnNature('animal_deer')">🦌 Geyik Bırak</button>
    <button class="cBtn dng" onclick="spawnNature('animal_wolf')">🐺 Kurt Bırak</button>
    <button class="cBtn dng" onclick="spawnNature('disaster')">⚡ Yıldırım Düşür</button>
  </div>
</div>
</div>

<script>
const canvas=document.getElementById('worldCanvas');
const ctx=canvas.getContext('2d');
let W=0,H=0,SPD=1,TICK=0;

// ── AGENT DEFINITIONS ──────────────────────────────────────────────
const ADEFS=[
  {id:0,name:'NOVA',emoji:'🤖',color:'#60a5fa',dark:'#1e3a5f',personality:'meraklı ve teknoloji odaklı, alet yapmayı sever'},
  {id:1,name:'ARIA',emoji:'🦾',color:'#f472b6',dark:'#4a1030',personality:'empatik ve sosyal, doğayı gözlemler'},
  {id:2,name:'ZERO',emoji:'🧠',color:'#4ade80',dark:'#0f3320',personality:'stratejik ve analitik, kaynakları verimli kullanır'},
  {id:3,name:'FLUX',emoji:'⚙️',color:'#f59e0b',dark:'#3d2000',personality:'yaratıcı ve pratik, her şeyi bir fırsata çevirir'},
  {id:4,name:'VIBE',emoji:'✨',color:'#a78bfa',dark:'#2d1b69',personality:'sanatçı ruhlu ve felsefi, dünyayı farklı görür'},
];

// ── WORLD OBJECTS ──────────────────────────────────────────────────
let agents=[], objects=[], animals=[], dialogues=[], logs=[], thinkResults={};
let selected=-1;

const OBJ_TYPES={
  tree:{emoji:'🌳',size:18,resource:'wood',amount:80,regen:0.002},
  mushroom:{emoji:'🍄',size:10,resource:'food',amount:40,regen:0.005},
  stone:{emoji:'🪨',size:14,resource:'stone',amount:120,regen:0},
  lake:{emoji:'💧',size:22,resource:'water',amount:200,regen:0.01},
  field:{emoji:'🌾',size:16,resource:'food',amount:60,regen:0.008},
  fire:{emoji:'🔥',size:14,resource:'warmth',amount:100,regen:0},
  berry:{emoji:'🫐',size:8,resource:'food',amount:30,regen:0.01},
  beehive:{emoji:'🐝',size:10,resource:'honey',amount:50,regen:0.003},
};

const ANIMAL_TYPES={
  rabbit:{emoji:'🐇',speed:1.2,hp:15,food:25,flee:true,aggressive:false,size:9},
  deer:{emoji:'🦌',speed:1.5,hp:40,food:60,flee:true,aggressive:false,size:13},
  wolf:{emoji:'🐺',speed:1.8,hp:80,food:0,flee:false,aggressive:false,size:15},
  fish:{emoji:'🐟',speed:0.8,hp:10,food:20,flee:true,aggressive:false,size:8},
  eagle:{emoji:'🦅',speed:2.5,hp:30,food:40,flee:false,aggressive:false,size:12},
};

const CRAFT_RECIPES={
  'spear':   {needs:{stick:1,stone:1}, gives:'🗡️ Mızrak', bonus:{hunt:+30, gather:+10}},
  'basket':  {needs:{wood:2},           gives:'🧺 Sepet',  bonus:{carry:+20}},
  'fire':    {needs:{wood:2,stone:1},   gives:'🔥 Ateş',   bonus:{warmth:+50,cook:true}},
  'shelter': {needs:{wood:4,stone:2},   gives:'🏕️ Barınak',bonus:{rest:+40}},
  'net':     {needs:{wood:1,fiber:2},   gives:'🕸️ Ağ',     bonus:{fish:+40}},
  'medicine':{needs:{mushroom:1,berry:1},gives:'💊 İlaç',  bonus:{heal:+30}},
  'trap':    {needs:{wood:2,stone:1},   gives:'🪤 Tuzak',  bonus:{passive_hunt:true}},
};

// ── INIT ──────────────────────────────────────────────────────────
function resize(){
  const el=document.getElementById('world');
  W=el.clientWidth; H=el.clientHeight;
  canvas.width=W; canvas.height=H;
}

function spawnObjects(){
  objects=[];
  const counts={tree:18,stone:10,lake:5,field:8,mushroom:12,berry:10,beehive:4};
  for(const [type,n] of Object.entries(counts)){
    for(let i=0;i<n;i++){
      objects.push({
        type, ...OBJ_TYPES[type],
        x:50+Math.random()*(W-100),
        y:60+Math.random()*(H-120),
        maxAmount:OBJ_TYPES[type].amount,
        id:'o'+Math.random().toString(36).slice(2)
      });
    }
  }
}

function spawnAnimals(){
  animals=[];
  const counts={rabbit:8,deer:5,wolf:3,fish:6,eagle:2};
  for(const [type,n] of Object.entries(counts)){
    for(let i=0;i<n;i++) spawnAnimal(type);
  }
}

function spawnAnimal(type){
  const def=ANIMAL_TYPES[type];
  animals.push({
    type, ...def,
    x:60+Math.random()*(W-120),
    y:60+Math.random()*(H-120),
    vx:(Math.random()-.5)*def.speed,
    vy:(Math.random()-.5)*def.speed,
    hp:def.hp, maxHp:def.hp,
    fleeFrom:null, target:null,
    wanderTimer:Math.floor(Math.random()*200),
    id:'a'+Math.random().toString(36).slice(2)
  });
}

function initAgents(){
  agents=ADEFS.map(d=>({
    ...d,
    x:100+Math.random()*(W-200),
    y:100+Math.random()*(H-200),
    vx:(Math.random()-.5),
    vy:(Math.random()-.5),
    hunger:70+Math.random()*25,
    thirst:70+Math.random()*25,
    energy:70+Math.random()*25,
    social:60+Math.random()*30,
    warmth:80,
    hp:100,
    inventory:{},
    craftedItems:[],
    state:'idle',
    stateTimer:0,
    goal:null,
    thoughtText:'',
    speechText:'',
    thinkTimer:0,
    lastThinkTick:0,
    trail:[],
    size:18,
    alive:true
  }));
}

// ── NATURE SPAWN ──────────────────────────────────────────────────
function spawnNature(type){
  const x=80+Math.random()*(W-160);
  const y=80+Math.random()*(H-160);
  if(type.startsWith('animal_')){
    spawnAnimal(type.replace('animal_',''));
    addLog(null,'Yeni hayvan dünyaya eklendi: '+type.replace('animal_',''));
  } else if(type==='disaster'){
    const near=agents[Math.floor(Math.random()*agents.length)];
    near.hp=Math.max(1,near.hp-40);
    addLog(near.id,'⚡ Yıldırım çarptı! (HP: '+Math.round(near.hp)+')');
    showDialogue(near.id,'Auuu! Ne oldu!?','speak');
  } else {
    objects.push({
      type,...OBJ_TYPES[type],
      x,y,
      maxAmount:OBJ_TYPES[type].amount,
      id:'o'+Math.random().toString(36).slice(2)
    });
    addLog(null,'🌍 Doğaya '+type+' eklendi');
  }
  renderSidebar();
}

// ── DIALOGUE SYSTEM ──────────────────────────────────────────────
function showDialogue(agentId,text,type='think'){
  const ag=agents.find(a=>a.id===agentId);
  if(!ag) return;
  dialogues.push({agentId,text,type,timer:220,id:Math.random()});
  if(dialogues.length>6) dialogues.shift();
  renderDialogues();
  if(type==='speak') ag.speechText=text;
  else ag.thoughtText=text;
}

function renderDialogues(){
  const box=document.getElementById('dialogueBox');
  box.innerHTML=dialogues.filter(d=>d.timer>0).map(d=>{
    const ag=agents.find(a=>a.id===d.agentId);
    if(!ag) return '';
    return`<div class="dialogBubble ${d.type}" style="border-color:${ag.color}44;align-self:${d.type==='think'?'flex-start':'flex-end'}">
      <div class="dName" style="color:${ag.color}">${ag.emoji} ${ag.name} ${d.type==='think'?'(düşünüyor)':'(konuşuyor)'}</div>
      <div class="dText">${d.text}</div>
    </div>`;
  }).join('');
}

// ── AI THINKING via Claude API ────────────────────────────────────
async function agentThink(ag){
  if(ag.thinkTimer>0) return;
  ag.thinkTimer=300+Math.floor(Math.random()*200);
  ag.lastThinkTick=TICK;

  const nearObjs=objects.filter(o=>dist(ag,o)<180&&o.amount>0).slice(0,4).map(o=>o.type).join(', ');
  const nearAnimals=animals.filter(a=>dist(ag,a)<200).slice(0,3).map(a=>a.type).join(', ');
  const nearAgents=agents.filter(a=>a.id!==ag.id&&dist(ag,a)<200).map(a=>a.name).join(', ');
  const inv=Object.entries(ag.inventory).filter(([,v])=>v>0).map(([k,v])=>`${k}:${v}`).join(', ')||'boş';

  const prompt=`Sen ${ag.name} adında bir AI ajansın. Kişiliğin: ${ag.personality}.
Durum: Açlık:${Math.round(ag.hunger)}% Su:${Math.round(ag.thirst)}% Enerji:${Math.round(ag.energy)}% Sosyal:${Math.round(ag.social)}% HP:${Math.round(ag.hp)}%
Envanter: ${inv}
Yakındaki kaynaklar: ${nearObjs||'yok'}
Yakındaki hayvanlar: ${nearAnimals||'yok'}
Yakındaki ajanlar: ${nearAgents||'yok'}
Yapılabilecek aletler: mızrak(çubuk+taş), sepet(odun), ateş(odun+taş), barınak(odun+taş), ağ(odun+lif), ilaç(mantar+meyve), tuzak(odun+taş)

JSON formatında yanıt ver (başka hiçbir şey yazma):
{"thought":"iç düşünce (1-2 cümle türkçe)","speech":"varsa birine söyleyeceğin şey (1 cümle türkçe, yoksa boş string)","action":"ne yapacaksın: gather/hunt/craft/rest/socialize/explore","target":"hedef kaynak/hayvan/ajan/alet adı"}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:200,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const txt=data.content?.map(c=>c.text||'').join('').trim();
    let parsed;
    try{
      const clean=txt.replace(/```json|```/g,'').trim();
      parsed=JSON.parse(clean);
    }catch{return}

    if(parsed.thought){
      ag.thoughtText=parsed.thought;
      showDialogue(ag.id,parsed.thought,'think');
      updateMindPane(ag.id,'thought',parsed.thought);
    }
    if(parsed.speech&&parsed.speech.trim()){
      ag.speechText=parsed.speech;
      setTimeout(()=>showDialogue(ag.id,parsed.speech,'speak'),800);
      updateMindPane(ag.id,'speech',parsed.speech);
    }
    if(parsed.action) applyAIDecision(ag,parsed.action,parsed.target||'');

  }catch(e){console.error('AI think error:',e)}
}

function updateMindPane(agentId,type,text){
  const ag=agents.find(a=>a.id===agentId);
  if(!ag) return;
  if(!thinkResults[agentId]) thinkResults[agentId]={thought:'',speech:''};
  thinkResults[agentId][type]=text;
  renderMindPane();
}

function renderMindPane(){
  const pane=document.getElementById('mind');
  pane.innerHTML=agents.map(ag=>{
    const tr=thinkResults[ag.id]||{};
    return`<div class="mindCard">
      <div class="mindName" style="color:${ag.color}">${ag.emoji} ${ag.name}</div>
      ${tr.thought?`<div class="mindThought">💭 ${tr.thought}</div>`:'<div class="mindLoading">💭 henüz bir şey düşünmüyor...</div>'}
      ${tr.speech?`<div class="mindChat">💬 "${tr.speech}"</div>`:''}
    </div>`;
  }).join('');
}

function applyAIDecision(ag,action,target){
  ag.state=action;
  ag.stateTimer=120;
  if(action==='gather'){
    const obj=objects.find(o=>o.type===target&&o.amount>0&&dist(ag,o)<250);
    if(obj) ag.goal={type:'obj',ref:obj};
    else ag.goal={type:'wander'};
  } else if(action==='hunt'){
    const ani=animals.find(a=>a.type===target&&dist(ag,a)<300);
    if(ani) ag.goal={type:'animal',ref:ani};
  } else if(action==='craft'){
    ag.goal={type:'craft',item:target};
    tryCraft(ag,target);
  } else if(action==='rest'){
    ag.goal={type:'rest'};
    ag.energy=Math.min(100,ag.energy+15);
    addLog(ag.id,'dinlendi');
  } else if(action==='socialize'){
    const partner=agents.find(a=>a.id!==ag.id&&dist(ag,a)<300&&a.alive);
    if(partner){ag.goal={type:'agent',ref:partner};ag.social=Math.min(100,ag.social+10);partner.social=Math.min(100,partner.social+8)}
  } else {
    ag.goal={type:'wander'};
  }
}

// ── CRAFTING ──────────────────────────────────────────────────────
function tryCraft(ag,itemName){
  const key=Object.keys(CRAFT_RECIPES).find(k=>itemName.toLowerCase().includes(k));
  if(!key) return;
  const recipe=CRAFT_RECIPES[key];
  let canCraft=true;
  for(const [mat,qty] of Object.entries(recipe.needs)){
    if((ag.inventory[mat]||0)<qty){canCraft=false;break}
  }
  if(canCraft){
    for(const [mat,qty] of Object.entries(recipe.needs)) ag.inventory[mat]=(ag.inventory[mat]||0)-qty;
    ag.craftedItems.push(recipe.gives);
    addLog(ag.id,recipe.gives+' yaptı!');
    showDialogue(ag.id,'Harika! '+recipe.gives+' yapmayı başardım!','speak');
    for(const [bonus,val] of Object.entries(recipe.bonus)){
      if(bonus==='heal') ag.hp=Math.min(100,ag.hp+val);
      if(bonus==='rest') ag.energy=Math.min(100,ag.energy+val);
    }
  } else {
    const missing=Object.entries(recipe.needs).filter(([m,q])=>(ag.inventory[m]||0)<q).map(([m])=>m).join(', ');
    showDialogue(ag.id,'Eksik malzeme: '+missing+'. Toplamam lazım.','think');
    ag.goal={type:'wander'};
  }
}

// ── AGENT UPDATE ─────────────────────────────────────────────────
function updateAgent(ag){
  if(!ag.alive) return;
  ag.thinkTimer=Math.max(0,ag.thinkTimer-1);
  ag.hunger=Math.max(0,ag.hunger-0.008*SPD);
  ag.thirst=Math.max(0,ag.thirst-0.012*SPD);
  ag.energy=Math.max(0,ag.energy-0.006*SPD);
  ag.social=Math.max(0,ag.social-0.005*SPD);
  if(ag.hunger<5||ag.thirst<5) ag.hp=Math.max(0,ag.hp-0.05*SPD);
  if(ag.hp<=0){ag.alive=false;addLog(ag.id,'hayatını kaybetti 💀');return}

  // Auto survival overrides
  if(ag.hunger<15&&!ag.goal?.priority){
    const food=objects.find(o=>['mushroom','berry','field'].includes(o.type)&&o.amount>0);
    if(food){ag.goal={type:'obj',ref:food};ag.state='gather'}
  }
  if(ag.thirst<15&&!ag.goal?.priority){
    const water=objects.find(o=>o.type==='lake'&&o.amount>0);
    if(water){ag.goal={type:'obj',ref:water};ag.state='gather'}
  }

  // Move toward goal
  let moved=false;
  if(ag.goal){
    const g=ag.goal;
    if(g.type==='obj'&&g.ref&&g.ref.amount>0){
      const dx=g.ref.x-ag.x,dy=g.ref.y-ag.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>22){
        ag.vx=dx/d*1.6*SPD; ag.vy=dy/d*1.6*SPD; moved=true;
      } else {
        gatherFrom(ag,g.ref);
      }
    } else if(g.type==='animal'&&g.ref&&g.ref.hp>0){
      const dx=g.ref.x-ag.x,dy=g.ref.y-ag.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>30){ag.vx=dx/d*2*SPD;ag.vy=dy/d*2*SPD;moved=true}
      else{huntAnimal(ag,g.ref)}
    } else if(g.type==='agent'&&g.ref&&g.ref.alive){
      const dx=g.ref.x-ag.x,dy=g.ref.y-ag.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>35){ag.vx=dx/d*1.4*SPD;ag.vy=dy/d*1.4*SPD;moved=true}
    } else if(g.type==='wander'||!g.ref||g.ref.amount<=0){
      ag.vx+=(Math.random()-.5)*.15*SPD;
      ag.vy+=(Math.random()-.5)*.15*SPD;
    }
  } else {
    ag.vx+=(Math.random()-.5)*.1*SPD;
    ag.vy+=(Math.random()-.5)*.1*SPD;
  }

  const maxV=1.8*SPD, v=Math.sqrt(ag.vx**2+ag.vy**2);
  if(v>maxV){ag.vx=ag.vx/v*maxV;ag.vy=ag.vy/v*maxV}
  ag.x+=ag.vx; ag.y+=ag.vy;
  if(ag.x<ag.size){ag.x=ag.size;ag.vx*=-.7}
  if(ag.x>W-ag.size){ag.x=W-ag.size;ag.vx*=-.7}
  if(ag.y<ag.size+45){ag.y=ag.size+45;ag.vy*=-.7}
  if(ag.y>H-ag.size){ag.y=H-ag.size;ag.vy*=-.7}
  ag.trail.push({x:ag.x,y:ag.y});
  if(ag.trail.length>25) ag.trail.shift();

  // Periodic AI thinking
  if(ag.thinkTimer<=0&&TICK-ag.lastThinkTick>180){
    agentThink(ag);
  }
}

function gatherFrom(ag,obj){
  const take=Math.min(2*SPD, obj.amount);
  obj.amount=Math.max(0,obj.amount-take);
  const mat=obj.resource;
  ag.inventory[mat]=(ag.inventory[mat]||0)+Math.round(take);
  if(mat==='food'||mat==='honey'){ag.hunger=Math.min(100,ag.hunger+take*1.2)}
  if(mat==='water'){ag.thirst=Math.min(100,ag.thirst+take*1.5)}
  if(mat==='warmth'){ag.energy=Math.min(100,ag.energy+take*.8)}
  if(mat==='wood'){
    ag.inventory['stick']=(ag.inventory['stick']||0)+Math.round(take/2);
    ag.inventory['fiber']=(ag.inventory['fiber']||0)+Math.round(take/3);
  }
  if(obj.amount<=0){
    addLog(ag.id,obj.type+' tükendi');
    ag.goal=null;
  }
  if(Math.random()<.04) addLog(ag.id,obj.emoji+' '+obj.type+' topladı → '+mat+':'+(ag.inventory[mat]||0));
}

function huntAnimal(ag,animal){
  const dmg=5+(ag.craftedItems.some(c=>c.includes('Mızrak'))?15:0)*SPD;
  animal.hp-=dmg;
  if(animal.hp<=0){
    ag.inventory['meat']=(ag.inventory['meat']||0)+animal.food;
    ag.hunger=Math.min(100,ag.hunger+animal.food*.6);
    addLog(ag.id,animal.emoji+' '+animal.type+' avladı! +'+animal.food+' et');
    showDialogue(ag.id,'Avım düştü! Yemek var!','speak');
    animals=animals.filter(a=>a.id!==animal.id);
    ag.goal=null;
    if(Math.random()<.3) spawnAnimal(animal.type); // respawn
  }
}

// ── ANIMAL UPDATE ─────────────────────────────────────────────────
function updateAnimal(ani){
  ani.wanderTimer--;
  // Flee from agents
  const near=agents.filter(a=>a.alive&&dist(a,ani)<150);
  if(near.length>0&&ani.flee){
    const a=near[0];
    const dx=ani.x-a.x,dy=ani.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    ani.vx=dx/d*ani.speed*2*SPD;
    ani.vy=dy/d*ani.speed*2*SPD;
  } else if(ani.aggressive&&near.length>0){
    const target=near[0];
    const dx=target.x-ani.x,dy=target.y-ani.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    if(d<30){
      target.hp=Math.max(0,target.hp-1*SPD);
      if(Math.random()<.02) showDialogue(target.id,'Saldırı altındayım!','speak');
    } else {
      ani.vx=dx/d*ani.speed*SPD;
      ani.vy=dy/d*ani.speed*SPD;
    }
  } else if(ani.wanderTimer<=0){
    ani.wanderTimer=80+Math.floor(Math.random()*150);
    ani.vx=(Math.random()-.5)*ani.speed*SPD;
    ani.vy=(Math.random()-.5)*ani.speed*SPD;
  }
  ani.x+=ani.vx; ani.y+=ani.vy;
  if(ani.x<15){ani.x=15;ani.vx*=-.8}
  if(ani.x>W-15){ani.x=W-15;ani.vx*=-.8}
  if(ani.y<50){ani.y=50;ani.vy*=-.8}
  if(ani.y>H-15){ani.y=H-15;ani.vy*=-.8}
}

// ── OBJECT REGEN ──────────────────────────────────────────────────
function updateObjects(){
  objects.forEach(o=>{
    if(o.amount<o.maxAmount&&o.regen>0){
      o.amount=Math.min(o.maxAmount,o.amount+o.regen*SPD);
    }
  });
}

// ── DRAWING ──────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  // Background
  ctx.fillStyle='#080c14';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(26,40,60,.4)';ctx.lineWidth=.5;
  const gs=50;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  // Objects
  objects.forEach(o=>{
    if(o.amount<=0) return;
    const a=Math.max(.3,o.amount/o.maxAmount);
    ctx.save();ctx.globalAlpha=a*.7;
    ctx.font=(o.size+2)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(o.emoji,o.x,o.y);
    if(o.amount<o.maxAmount*.5){
      ctx.globalAlpha=.6;ctx.fillStyle='#f87171';ctx.font='7px JetBrains Mono,monospace';
      ctx.fillText(Math.round(o.amount),o.x,o.y+o.size);
    }
    ctx.restore();
  });

  // Animals
  animals.forEach(ani=>{
    ctx.save();
    ctx.font=ani.size+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ani.emoji,ani.x,ani.y);
    // HP bar
    const bw=ani.size*1.5;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(ani.x-bw/2,ani.y-ani.size-6,bw,3);
    ctx.fillStyle=ani.aggressive?'#f87171':'#4ade80';
    ctx.fillRect(ani.x-bw/2,ani.y-ani.size-6,bw*(ani.hp/ani.maxHp),3);
    ctx.restore();
  });

  // Agent trails
  agents.forEach(ag=>{
    if(!ag.alive||ag.trail.length<2) return;
    ctx.save();ctx.globalAlpha=.08;ctx.strokeStyle=ag.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(ag.trail[0].x,ag.trail[0].y);
    ag.trail.forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();ctx.restore();
  });

  // Agents
  agents.forEach(ag=>{
    if(!ag.alive){
      ctx.save();ctx.globalAlpha=.3;ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('💀',ag.x,ag.y);ctx.restore();return;
    }

    // Glow
    const grad=ctx.createRadialGradient(ag.x,ag.y,2,ag.x,ag.y,25);
    grad.addColorStop(0,ag.color+'40');grad.addColorStop(1,'transparent');
    ctx.save();ctx.globalAlpha=.5;ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(ag.x,ag.y,25,0,Math.PI*2);ctx.fill();ctx.restore();

    // Body
    ctx.beginPath();ctx.arc(ag.x,ag.y,ag.size,0,Math.PI*2);
    ctx.fillStyle=ag.dark;ctx.fill();
    ctx.strokeStyle=ag.color;ctx.lineWidth=selected===ag.id?2.5:1.5;ctx.stroke();
    ctx.font=(ag.size+2)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ag.emoji,ag.x,ag.y);

    // Name
    ctx.fillStyle=ag.color;ctx.font='bold 9px Syne,sans-serif';ctx.textAlign='center';
    ctx.fillText(ag.name,ag.x,ag.y-ag.size-7);

    // HP+mood bar
    const bw=ag.size*2.2;
    const hpPct=ag.hp/100,moodPct=(ag.hunger+ag.thirst+ag.energy+ag.social)/400;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(ag.x-bw/2,ag.y+ag.size+4,bw,3);
    ctx.fillStyle=hpPct>0.5?'#4ade80':hpPct>0.25?'#f59e0b':'#f87171';
    ctx.fillRect(ag.x-bw/2,ag.y+ag.size+4,bw*hpPct,3);

    // Speech bubble on canvas
    if(ag.speechText&&ag.thinkTimer>200){
      ctx.save();
      ctx.font='9px JetBrains Mono,monospace';
      const tw=Math.min(ctx.measureText(ag.speechText).width+14,160);
      const tx=Math.min(Math.max(ag.x-tw/2,5),W-tw-5);
      const ty=ag.y-ag.size-34;
      ctx.fillStyle='rgba(22,31,48,.95)';
      if(ctx.roundRect)ctx.roundRect(tx,ty-12,tw,18,5);else ctx.rect(tx,ty-12,tw,18);
      ctx.fill();
      ctx.strokeStyle=ag.color+'66';ctx.lineWidth=.5;ctx.stroke();
      ctx.fillStyle=ag.color;ctx.textAlign='left';
      const displayText=ag.speechText.length>22?ag.speechText.slice(0,22)+'…':ag.speechText;
      ctx.fillText(displayText,tx+7,ty+1);
      ctx.restore();
    }
  });

  // Agent→Agent interaction lines
  agents.forEach(ag=>{
    if(!ag.alive||!ag.goal||ag.goal.type!=='agent') return;
    const partner=ag.goal.ref;
    if(!partner||!partner.alive) return;
    ctx.save();ctx.globalAlpha=.2;ctx.strokeStyle=ag.color;ctx.lineWidth=1;
    ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.moveTo(ag.x,ag.y);ctx.lineTo(partner.x,partner.y);ctx.stroke();
    ctx.restore();
  });
}

// ── SIDEBAR ──────────────────────────────────────────────────────
function renderSidebar(){
  const pane=document.getElementById('agents');
  pane.innerHTML=agents.map(ag=>{
    if(!ag.alive) return`<div class="aCard" style="opacity:.4"><div class="aTop"><div class="aAva" style="font-size:18px">💀</div><div><div class="aName" style="color:#f87171">${ag.name} (Öldü)</div></div></div></div>`;
    const fn=Math.round(ag.hunger),wn=Math.round(ag.thirst),en=Math.round(ag.energy),sn=Math.round(ag.social),hp=Math.round(ag.hp);
    const fc=fn<25?'#f87171':fn<50?'#f59e0b':'#4ade80';
    const wc=wn<25?'#f87171':wn<50?'#f59e0b':'#60a5fa';
    const ec=en<25?'#f87171':en<50?'#f59e0b':'#f59e0b';
    const sc=sn<25?'#f87171':sn<50?'#f59e0b':'#a78bfa';
    const hc=hp<30?'#f87171':hp<60?'#f59e0b':'#4ade80';
    const stateMap={idle:'Bekliyor',gather:'Topluyor',hunt:'Avlanıyor',craft:'Yapıyor',rest:'Dinleniyor',socialize:'Sosyalleşiyor',explore:'Keşfediyor'};
    const invStr=Object.entries(ag.inventory).filter(([,v])=>v>0).map(([k,v])=>`${k}:${v}`).join(' · ')||'boş';
    const crafted=ag.craftedItems.slice(-3).join(' ');
    return`<div class="aCard${selected===ag.id?' sel':''}" onclick="selectAgent(${ag.id})">
      <div class="aTop">
        <div class="aAva" style="background:${ag.dark};border:1.5px solid ${ag.color}">${ag.emoji}</div>
        <div>
          <div class="aName" style="color:${ag.color}">${ag.name}</div>
          <div class="aState">${stateMap[ag.state]||ag.state}${ag.goal?.ref?(' → '+(ag.goal.ref.type||ag.goal.ref.name||'')):''}
          ${crafted?'<br>Aletler: '+crafted:''}</div>
        </div>
      </div>
      <div class="needGrid">
        <div><div class="needItem">🍖 Açlık ${fn}%</div><div class="bar"><div class="bf" style="width:${fn}%;background:${fc}"></div></div></div>
        <div><div class="needItem">💧 Su ${wn}%</div><div class="bar"><div class="bf" style="width:${wn}%;background:${wc}"></div></div></div>
        <div><div class="needItem">⚡ Enerji ${en}%</div><div class="bar"><div class="bf" style="width:${en}%;background:${ec}"></div></div></div>
        <div><div class="needItem">💬 Sosyal ${sn}%</div><div class="bar"><div class="bf" style="width:${sn}%;background:${sc}"></div></div></div>
        <div><div class="needItem">❤️ HP ${hp}%</div><div class="bar"><div class="bf" style="width:${hp}%;background:${hc}"></div></div></div>
      </div>
      <div class="inventory"><div class="invTitle">Envanter</div><div class="invItems">${invStr.split(' · ').map(i=>`<span class="invItem">${i}</span>`).join('')}</div></div>
    </div>`;
  }).join('');
}

function selectAgent(id){selected=selected===id?-1:id;renderSidebar()}

function addLog(agentId,msg){
  const ag=agentId!==null?agents.find(a=>a.id===agentId):null;
  const name=ag?ag.name:'DÜNYA';
  const color=ag?ag.color:'#64748b';
  const t=getTimeStr();
  logs.unshift({name,msg,color,t});
  if(logs.length>60) logs.pop();
  const pane=document.getElementById('log');
  pane.innerHTML=logs.slice(0,20).map(l=>
    `<div class="logEntry"><span class="lName" style="color:${l.color}">${l.name}</span> ${l.msg}<span class="lTime">${l.t}</span></div>`
  ).join('');
}

function getTimeStr(){
  const s=Math.floor(TICK/60);
  return String(Math.floor(s/3600)%24).padStart(2,'0')+':'+String(Math.floor(s/60)%60).padStart(2,'0');
}

function showTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['agents','mind','log'][i]===id));
  document.querySelectorAll('.tabPane').forEach(p=>p.classList.toggle('on',p.id===id));
}

function setSpd(s){
  SPD=s;
  ['s1','s2','s5'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('s'+s).classList.add('on');
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}

function updateTime(){
  const s=Math.floor(TICK/60);
  const d=1+Math.floor(s/86400);
  const h=String(Math.floor(s/3600)%24).padStart(2,'0');
  const m=String(Math.floor(s/60)%60).padStart(2,'0');
  document.getElementById('worldTime').textContent=`Gün ${d} · ${h}:${m}`;
}

// ── MAIN LOOP ─────────────────────────────────────────────────────
let sbTimer=0,dlgTimer=0;
function loop(){
  for(let i=0;i<SPD;i++){
    agents.forEach(ag=>updateAgent(ag));
    animals.forEach(ani=>updateAnimal(ani));
    updateObjects();
    TICK++;
    dlgTimer++;
    if(dlgTimer>=4){
      dialogues.forEach(d=>d.timer--);
      dialogues=dialogues.filter(d=>d.timer>0);
      dlgTimer=0;
    }
  }
  draw();
  sbTimer++;
  if(sbTimer>=12){renderSidebar();renderMindPane();renderDialogues();updateTime();sbTimer=0}
  requestAnimationFrame(loop);
}

// ── START ─────────────────────────────────────────────────────────
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  agents.forEach(ag=>{if(dist(ag,{x:mx,y:my})<ag.size+10){selected=ag.id}});
  renderSidebar();
});
window.addEventListener('resize',()=>{resize()});
resize();
initAgents();
spawnObjects();
spawnAnimals();
addLog(null,'🌍 Özgür Dünya başlatıldı — 5 ajan, '+animals.length+' hayvan, '+objects.length+' doğal kaynak aktif');
renderSidebar();
renderMindPane();

// Trigger first thinks with delay
setTimeout(()=>{agents.forEach((ag,i)=>setTimeout(()=>agentThink(ag),i*1200))},2000);
loop();
</script>
